apiVersion: apps/v1
kind: Deployment
metadata:
  name: testapp2-frontend
  namespace: opsforge-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: testapp2-frontend
  template:
    metadata:
      labels:
        app: testapp2-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/biraj49/testapp2-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
