apiVersion: v1
kind: Service
metadata:
  name: testapp2-backend
  namespace: opsforge-system
spec:
  selector:
    app: testapp2-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: testapp2-frontend
  namespace: opsforge-system
spec:
  selector:
    app: testapp2-frontend
  ports:
    - port: 80
      targetPort: 80
