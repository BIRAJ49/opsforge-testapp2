apiVersion: v1
kind: ConfigMap
metadata:
  name: testapp2-config
  namespace: opsforge-system
data:
  APP_ENV: dev
  REDIS_URL: redis://testapp2-redis:6379/0
---
apiVersion: v1
kind: Secret
metadata:
  name: testapp2-secret
  namespace: opsforge-system
type: Opaque
stringData:
  DATABASE_URL: replace-with-database-url
  POSTGRES_PASSWORD: replace-with-secure-password
  JWT_SECRET_KEY: replace-with-secure-secret
