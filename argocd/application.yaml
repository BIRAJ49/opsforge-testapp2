apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: testapp2-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/biraj49/opsforge-gitops.git
    targetRevision: main
    path: apps/testapp2/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: opsforge-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
